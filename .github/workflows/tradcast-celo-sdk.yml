name: Tradcast Celo SDK CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "packages/tradcast-celo-sdk/**"
      - ".github/workflows/tradcast-celo-sdk-ci.yml"
  pull_request:
    paths:
      - "packages/tradcast-celo-sdk/**"
      - ".github/workflows/tradcast-celo-sdk-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build SDK package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: packages/tradcast-celo-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/tradcast-celo-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify npm package output
        run: npm pack --dry-run
